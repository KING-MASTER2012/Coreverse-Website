name: Bug Report
description: Report a bug or unexpected behavior.
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots

  - type: input
    id: browser
    attributes:
      label: Browser

  - type: input
    id: os
    attributes:
      label: Operating System
